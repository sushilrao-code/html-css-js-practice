<!DOCTYPE html>
<html>
<head>
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: blue;
    }
    .container {
      width: 90%;
      margin: auto;
    }
    .section {
      margin-top: 30px;
    }
    .form-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .form-group {
      width: 48%;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    table, th, td {
      border: 1px solid black;
    }
    th, td {
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Registration form</h2>

    <div class="section">
      <h3>Basic details</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name">

          <label for="motherName">Mother's Name</label>
          <input type="text" id="motherName" name="motherName">

          <label for="age">Age</label>
          <input type="number" id="age" name="age">

          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">--select--</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fatherName">Father's Name</label>
          <input type="text" id="fatherName" name="fatherName">

          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone">

          <label for="dob">D.O.B</label>
          <input type="date" id="dob" name="dob">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>Education Details</h3>
      <table>
        <tr>
          <th>Class</th>
          <th>Board/College/University</th>
          <th>Year of Passing</th>
          <th>Marks Obtained</th>
          <th>Max Marks</th>
          <th>(%)</th>
        </tr>
        <tr>
          <td>10th</td>
          <td><input type="text" name="board_10"></td>
          <td><input type="text" name="year_10"></td>
          <td><input type="text" name="marks_10"></td>
          <td><input type="text" name="max_10"></td>
          <td><input type="text" name="percent_10"></td>
        </tr>
        <tr>
          <td>12th</td>
          <td><input type="text" name="board_12"></td>
          <td><input type="text" name="year_12"></td>
          <td><input type="text" name="marks_12"></td>
          <td><input type="text" name="max_12"></td>
          <td><input type="text" name="percent_12"></td>
        </tr>
        <tr>
          <td>B TECH</td>
          <td><input type="text" name="board_btech"></td>
          <td><input type="text" name="year_btech"></td>
          <td><input type="text" name="marks_btech"></td>
          <td><input type="text" name="max_btech"></td>
          <td><input type="text" name="percent_btech"></td>
        </tr>
      </table>
    </div>

    <div class="section">
      <h3>Any other:</h3>
      <table>
        <tr>
          <th>Name of course</th>
          <th>Board</th>
          <th>Year of passing</th>
          <th>Per(%)</th>
        </tr>
        <tr>
          <td><input type="text" name="other_course"></td>
          <td><input type="text" name="other_board"></td>
          <td><input type="text" name="other_year"></td>
          <td><input type="text" name="other_percent"></td>
        </tr>
        <input type="checkbox" >
      </table>
    </div>
  </div>

</body>
</html>
