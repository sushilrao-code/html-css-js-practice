<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    .container {
      background-color: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      margin: auto;
    }

    h2, h3 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input[type="text"],
    input[type="date"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Student Registration Form</h2>
    <form id="registrationForm">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="fatherName">Father's Name:</label>
      <input type="text" id="fatherName" name="fatherName" required>

      <label for="rollNumber">Roll NUMBER:</label>
      <input type="text" id="rollNumber" name="rollNumber" required>

      <label for="class">Class:</label>
      <input type="text" id="class" name="class" required>

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob" required>

      <h3>Address Details</h3>
      <label for="address">Full Address:</label>
      <textarea id="address" name="address" rows="2" required></textarea>

      <label for="city">City:</label>
      <input type="text" id="city" name="city" required>

      <label for="pincode">Pin Code:</label>
      <input type="text" id="pincode" name="pincode" pattern="\d{6}" required>

      <label for="photo">Upload Photo:</label>
      <input type="file" id="photo" name="photo" accept="image/*" required>

      <label for="signature">Upload Signature:</label>
      <input type="file" id="signature" name="signature" accept="image/*" required>

      <label>
        <input type="checkbox" id="declaration" required>
        I hereby declare that the information provided is true to the best of my knowledge.
      </label>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    document.getElementById("registrationForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const formData = {
        name: document.getElementById('name').value,
        fatherName: document.getElementById('fatherName').value,
        rollNumber: document.getElementById('rollNumber').value,
        class: document.getElementById('class').value,
        dob: document.getElementById('dob').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        pincode: document.getElementById('pincode').value,
        declaration: document.getElementById('declaration').checked
      };

      const photoInput = document.getElementById('photo');
      const signatureInput = document.getElementById('signature');

      const reader1 = new FileReader();
      const reader2 = new FileReader();

      reader1.onload = function (e) {
        formData.photo = e.target.result;

        reader2.onload = function (e) {
          formData.signature = e.target.result;

          // Save data in localStorage
          localStorage.setItem('studentData', JSON.stringify(formData));

          // Redirect
          window.location.href = 'project.html';
        };

        reader2.readAsDataURL(signatureInput.files[0]);
      };

      reader1.readAsDataURL(photoInput.files[0]);
    });
  </script>

</body>
</html>
