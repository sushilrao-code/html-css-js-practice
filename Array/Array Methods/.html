<!DOCTYPE html>
<html>
<head>
  <title>Array Methods Examples</title>
</head>
<body>
  <script>
    let arr = [10, 20, 30, 40, 50];

    // ---------- PUSH (end mein add) ----------
    console.log("---- PUSH ----");
    let a1 = [1, 2, 3];
    a1.push(4);
    console.log("Built-in push:", a1);

    let a1m = [1, 2, 3];
    a1m[a1m.length] = 4; // manual push
    console.log("Manual push:", a1m);


    // ---------- POP (end se remove) ----------
    console.log("---- POP ----");
    let a2 = [1, 2, 3, 4];
    a2.pop();
    console.log("Built-in pop:", a2);

    let a2m = [1, 2, 3, 4];
    let newArr2 = [];
    for (let i = 0; i < a2m.length - 1; i++) {
      newArr2[i] = a2m[i];
    }
    console.log("Manual pop:", newArr2);


    // ---------- UNSHIFT (start mein add) ----------
    console.log("---- UNSHIFT ----");
    let a3 = [2, 3, 4];
    a3.unshift(1);
    console.log("Built-in unshift:", a3);

    let a3m = [2, 3, 4];
    let newArr3 = [1];
    for (let i = 0; i < a3m.length; i++) {
      newArr3[i + 1] = a3m[i];
    }
    console.log("Manual unshift:", newArr3);


    // ---------- SHIFT (start se remove) ----------
    console.log("---- SHIFT ----");
    let a4 = [1, 2, 3, 4];
    a4.shift();
    console.log("Built-in shift:", a4);

    let a4m = [1, 2, 3, 4];
    let newArr4 = [];
    for (let i = 1; i < a4m.length; i++) {
      newArr4[i - 1] = a4m[i];
    }
    console.log("Manual shift:", newArr4);


    // ---------- INDEXOF (index dhundo) ----------
    console.log("---- INDEXOF ----");
    let a5 = [10, 20, 30, 40];
    console.log("Built-in indexOf:", a5.indexOf(30));

    let foundIndex = -1;
    for (let i = 0; i < a5.length; i++) {
      if (a5[i] === 30) {
        foundIndex = i;
        break;
      }
    }
    console.log("Manual indexOf:", foundIndex);


    // ---------- INCLUDES (true/false) ----------
    console.log("---- INCLUDES ----");
    let a6 = [10, 20, 30];
    console.log("Built-in includes:", a6.includes(20));

    let found = false;
    for (let i = 0; i < a6.length; i++) {
      if (a6[i] === 20) {
        found = true;
        break;
      }
    }
    console.log("Manual includes:", found);


    // ---------- FIND (pehla matching element) ----------
    console.log("---- FIND ----");
    let a7 = [5, 12, 8, 20];
    console.log("Built-in find:", a7.find(x => x > 10));

    let foundVal;
    for (let i = 0; i < a7.length; i++) {
      if (a7[i] > 10) {
        foundVal = a7[i];
        break;
      }
    }
    console.log("Manual find:", foundVal);


    // ---------- FINDINDEX ----------
    console.log("---- FINDINDEX ----");
    let a8 = [5, 12, 8, 20];
    console.log("Built-in findIndex:", a8.findIndex(x => x > 10));

    let foundIdx = -1;
    for (let i = 0; i < a8.length; i++) {
      if (a8[i] > 10) {
        foundIdx = i;
        break;
      }
    }
    console.log("Manual findIndex:", foundIdx);


    // ---------- MAP (transform karke naya array) ----------
    console.log("---- MAP ----");
    let a9 = [1, 2, 3, 4];
    console.log("Built-in map:", a9.map(x => x * 2));

    let mapped = [];
    for (let i = 0; i < a9.length; i++) {
      mapped[i] = a9[i] * 2;
    }
    console.log("Manual map:", mapped);


    // ---------- FILTER (condition pe naya array) ----------
    console.log("---- FILTER ----");
    let a10 = [1, 2, 3, 4, 5, 6];
    console.log("Built-in filter:", a10.filter(x => x % 2 === 0));

    let filtered = [];
    let j = 0;
    for (let i = 0; i < a10.length; i++) {
      if (a10[i] % 2 === 0) {
        filtered[j] = a10[i];
        j++;
      }
    }
    console.log("Manual filter:", filtered);


    // ---------- REDUCE (combine karke ek value) ----------
    console.log("---- REDUCE ----");
    let a11 = [1, 2, 3, 4];
    console.log("Built-in reduce:", a11.reduce((sum, x) => sum + x, 0));

    let total = 0;
    for (let i = 0; i < a11.length; i++) {
      total = total + a11[i];
    }
    console.log("Manual reduce:", total);


    // ---------- FOREACH (loop, kuch return nahi) ----------
    console.log("---- FOREACH ----");
    let a12 = [1, 2, 3];
    a12.forEach(x => console.log("Built-in forEach element:", x));

    for (let i = 0; i < a12.length; i++) {
      console.log("Manual forEach element:", a12[i]);
    }


    // ---------- SLICE (copy nikalta hai, original same rehta hai) ----------
    console.log("---- SLICE ----");
    let a13 = [10, 20, 30, 40, 50];
    console.log("Built-in slice(1,3):", a13.slice(1, 3));

    let sliced = [];
    let k = 0;
    for (let i = 1; i < 3; i++) {
      sliced[k] = a13[i];
      k++;
    }
    console.log("Manual slice(1,3):", sliced);


    // ---------- CONCAT (arrays jodna) ----------
    console.log("---- CONCAT ----");
    let a14a = [1, 2];
    let a14b = [3, 4];
    console.log("Built-in concat:", a14a.concat(a14b));

    let combined = [];
    let m = 0;
    for (let i = 0; i < a14a.length; i++) {
      combined[m] = a14a[i];
      m++;
    }
    for (let i = 0; i < a14b.length; i++) {
      combined[m] = a14b[i];
      m++;
    }
    console.log("Manual concat:", combined);


    // ---------- SORT (sort karna - numbers ke liye) ----------
    console.log("---- SORT ----");
    let a15 = [5, 2, 8, 1, 9];
    console.log("Built-in sort:", [...a15].sort((a, b) => a - b));

    let a15m = [5, 2, 8, 1, 9];
    for (let i = 0; i < a15m.length; i++) {
      for (let j = 0; j < a15m.length - i - 1; j++) {
        if (a15m[j] > a15m[j + 1]) {
          let temp = a15m[j];
          a15m[j] = a15m[j + 1];
          a15m[j + 1] = temp;
        }
      }
    }
    console.log("Manual sort (bubble sort):", a15m);


    // ---------- REVERSE (ulta karna) ----------
    console.log("---- REVERSE ----");
    let a16 = [1, 2, 3, 4, 5];
    console.log("Built-in reverse:", [...a16].reverse());

    let a16m = [1, 2, 3, 4, 5];
    let reversed = [];
    let n = 0;
    for (let i = a16m.length - 1; i >= 0; i--) {
      reversed[n] = a16m[i];
      n++;
    }
    console.log("Manual reverse:", reversed);


    // ---------- JOIN (array ko string banana) ----------
    console.log("---- JOIN ----");
    let a17 = [1, 2, 3];
    console.log("Built-in join:", a17.join("-"));

    let result = "";
    for (let i = 0; i < a17.length; i++) {
      result += a17[i];
      if (i < a17.length - 1) {
        result += "-";
      }
    }
    console.log("Manual join:", result);

  </script>
</body>
</html>
