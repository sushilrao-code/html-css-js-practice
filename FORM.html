<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Admissions Form</title>
  
 <style> 
  
    h1 {
      text-align: center;
    }
    .form-section {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row > div {
      flex: 1;
    }
    .gender-row, .language-row {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }
    .submit-btn {
      text-align: right;
      margin-top: 20px;
    }
    button {
      background-color: #3366ff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>  
</head>
<body>

  <form>
    <h1>COLLEGE ADMISSIONS FORM</h1>
    <p>Enter your admission information below</p>

    
          <label>First Name</label>
          <input type="text" name="first_name">
        </div>
        <div>
          <label>Middle Initial</label>
          <input type="text" name="middle_initial">
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="last_name">
        </div>
      </div>
    </div> 

    <div class="form-section">
      <label>Birth Date</label>
      <div class="row">
        <select name="birth_month">
  <option value="">Please select a month</option>
  <option value="January">January</option>
  <option value="February">February</option>
  <option value="March">March</option>
  <option value="April">April</option>
  <option value="May">May</option>
  <option value="June">June</option>
  <option value="July">July</option>
  <option value="August">August</option>
  <option value="September">September</option>
  <option value="October">October</option>
  <option value="November">November</option>
  <option value="December">December</option>
</select>
        
        <select name="birth_day">
  <option value="">Please select a day</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
  <option value="11">11</option>
  <option value="12">12</option>
  <option value="13">13</option>
  <option value="14">14</option>
  <option value="15">15</option>
  <option value="16">16</option>
  <option value="17">17</option>
  <option value="18">18</option>
  <option value="19">19</option>
  <option value="20">20</option>
  <option value="21">21</option>
  <option value="22">22</option>
  <option value="23">23</option>
  <option value="24">24</option>
  <option value="25">25</option>
  <option value="26">26</option>
  <option value="27">27</option>
  <option value="28">28</option>
  <option value="29">29</option>
  <option value="30">30</option>
  <option value="31">31</option>
</select>
          <select name="birth_year">
  <option value="">Please select a year</option>
  <option value="2025">2025</option>
  <option value="2024">2024</option>
  <option value="2023">2023</option>
  <option value="2022">2022</option>
  <option value="2021">2021</option>
  <option value="2020">2020</option>
  <option value="2019">2019</option>
  <option value="2018">2018</option>
  <option value="2017">2017</option>
  <option value="2016">2016</option>
  <option value="2015">2015</option>
  <option value="2014">2014</option>
  <option value="2013">2013</option>
  <option value="2012">2012</option>
  <option value="2011">2011</option>
  <option value="2010">2010</option>
  <option value="2009">2009</option>
  <option value="2008">2008</option>
  <option value="2007">2007</option>
  <option value="2006">2006</option>
  <option value="2005">2005</option>
  <option value="2004">2004</option>
  <option value="2003">2003</option>
  <option value="2002">2002</option>
  <option value="2001">2001</option>
  <option value="2000">2000</option>
</select>
      </div>
    </div>

    <div class="form-section">
      <label>Gender</label>
      <div class="gender-row">
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
      </div>
    </div>

    <div class="form-section">
      <label>Of which country are you a citizen?</label>
      <select name="citizenship">
        <option>Please Select</option>
         <option value="INDIA">INDIA</option>
          <option value="UK">UK</option>
           <option value="USA">USA</option>
            <option value="RUSSIA">RUSSIA</option>
             <option value="THAILAND">THAILAND</optio>
      </select>
    </div>

    <div class="form-section">
      <label>Phone</label>
      <input type="tel" name="phone" placeholder="(000) 000-0000">

      <label>E-mail Address</label>
      <input type="email" name="email" placeholder="example@example.com">
    </div>

    <div class="form-section">
      <label>Mailing Address</label>
      <input type="text" name="address1" placeholder="Street Address">
      <input type="text" name="address2" placeholder="Street Address Line 2">

      <div class="row">
        <div>
          <label>City</label>
          <input type="text" name="city">
        </div>
        <div>
          <label>State / Province</label>
          <input type="text" name="state">
        </div>
      </div>

      <label>Postal / Zip Code</label>
      <input type="text" name="zip">
    </div>

    <div class="form-section">
      <label>Emergency Contact</label>
      <div class="row">
        <div>
          <label>First Name</label>
          <input type="text" name="emergency_first">
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="emergency_last">
        </div>
        <div>
          <label>Relationship</label>
          <input type="text" name="relationship">
        </div>
      </div>

      <label>Email</label>
      <input type="email" name="emergency_email" placeholder="example@example.com">
      
      <label>Phone Number</label>
      <input type="tel" name="emergency_phone" placeholder="(000) 000-0000">
    </div>

    <div class="form-section">
      <label>Do you speak any languages other than English?</label>
      <div class="language-row">
        <label><input type="radio" name="other_languages" value="yes"> Yes</label>
        <label><input type="radio" name="other_languages" value="no"> No</label>
      </div>
    </div>

    <div class="submit-btn">
      <button type="submit">Next</button>
    </div>
    <input type="checkbox" checked>agree the all details are correct

  </form>

</body>
</html>
