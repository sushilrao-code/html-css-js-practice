<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Boxmodel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
           
            
        }
        .box{
           background-color: rgb(102, 111, 111);
        }
        .box1{
           color: rgb(155, 15, 15);
           padding: 10px;
           margin: 10px;
           border: 2px solid rgb(18, 169, 38);
           height: 200px;
           box-sizing: border-box;
        }
        .box2{
           color: rgb(213, 194, 17);
            color: rgb(155, 15, 15);
           padding: 10px;
           margin: 10px;
           border: 2px solid rgb(0, 0, 0);
           height: 200px;
           box-sizing: border-box;
        }
        
    </style>
</head>
<body>
    <div class="box box1">I am a box1</div>
     <div class="box box2">I am a box 2</div>   

    
</body>
</html>
