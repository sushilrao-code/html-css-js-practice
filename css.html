<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Admissions Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f9f9f9;
    }
    form {
      background: #fff;
      padding: 20px;
      max-width: 700px;
      margin: auto;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
    }
    .form-section {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row > div {
      flex: 1;
    }
    .gender-row, .language-row {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }
    .submit-btn {
      text-align: right;
      margin-top: 20px;
    }
    button {
      background-color: #3366ff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <form>
    <h1>COLLEGE ADMISSIONS FORM</h1>
    <p>Enter your admission information below</p>

    <div class="form-section">
      <div class="row">
        <div>
          <label>First Name</label>
          <input type="text" name="first_name">
        </div>
        <div>
          <label>Middle Initial</label>
          <input type="text" name="middle_initial">
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="last_name">
        </div>
      </div>
    </div>

    <div class="form-section">
      <label>Birth Date</label>
      <div class="row">
        <select name="birth_month">
          <option>Please select a month</option>
          <!-- Add month options -->
        </select>
        <select name="birth_day">
          <option>Please select a day</option>
          <!-- Add day options -->
        </select>
        <select name="birth_year">
          <option>Please select a year</option>
          <!-- Add year options -->
        </select>
      </div>
    </div>

    <div class="form-section">
      <label>Gender</label>
      <div class="gender-row">
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
      </div>
    </div>

    <div class="form-section">
      <label>Of which country are you a citizen?</label>
      <select name="citizenship">
        <option>Please Select</option>
        <!-- Add country options -->
      </select>
    </div>

    <div class="form-section">
      <label>Phone</label>
      <input type="tel" name="phone" placeholder="(000) 000-0000">

      <label>E-mail Address</label>
      <input type="email" name="email" placeholder="example@example.com">
    </div>

    <div class="form-section">
      <label>Mailing Address</label>
      <input type="text" name="address1" placeholder="Street Address">
      <input type="text" name="address2" placeholder="Street Address Line 2">

      <div class="row">
        <div>
          <label>City</label>
          <input type="text" name="city">
        </div>
        <div>
          <label>State / Province</label>
          <input type="text" name="state">
        </div>
      </div>

      <label>Postal / Zip Code</label>
      <input type="text" name="zip">
    </div>

    <div class="form-section">
      <label>Emergency Contact</label>
      <div class="row">
        <div>
          <label>First Name</label>
          <input type="text" name="emergency_first">
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="emergency_last">
        </div>
        <div>
          <label>Relationship</label>
          <input type="text" name="relationship">
        </div>
      </div>

      <label>Email</label>
      <input type="email" name="emergency_email" placeholder="example@example.com">
      
      <label>Phone Number</label>
      <input type="tel" name="emergency_phone" placeholder="(000) 000-0000">
    </div>

    <div class="form-section">
      <label>Do you speak any languages other than English?</label>
      <div class="language-row">
        <label><input type="radio" name="other_languages" value="yes"> Yes</label>
        <label><input type="radio" name="other_languages" value="no"> No</label>
      </div>
    </div>

    <div class="submit-btn">
      <button type="submit">Next</button>
    </div>
  </form>

</body>
</html>
