<!--Write html and css code to style a paragraph inside a div which contains 5 other paragraphs.
 The first paragraph must have background color yellow and text color red. The HMTL is written below for your
  reference.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAMPLE</title>
    <style>
        .highlight {
            background-color: yellow;
            color: red;
        }

    </style>
</head>
<body>
<div>
    <p class="highlight">This is the first paragraph with yellow background and red text.</p>
    <p>This is the second paragraph.</p>
    <p>This is the third paragraph.</p>
    <p>This is the fourth paragraph.</p>
    <p>This is the fifth paragraph.</p>
    <p>This is the sixth paragraph.</p>
    
</body>
</html>
