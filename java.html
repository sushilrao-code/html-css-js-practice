<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Admissions Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    .form-container {
      background: #ffffff;
      max-width: 900px;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .col {
      flex: 1;
      min-width: 250px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    button {
      background-color: #0066ff;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .output {
      margin-top: 30px;
      background-color: #e8f5e9;
      padding: 20px;
      border-left: 5px solid green;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2>COLLEGE ADMISSIONS FORM</h2>
  <form id="admissionForm">
    <div class="row">
      <div class="col form-group">
        <label>First Name</label>
        <input type="text" id="firstName" required>
      </div>
      <div class="col form-group">
        <label>Middle Initial</label>
        <input type="text" id="middleName">
      </div>
      <div class="col form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" required>
      </div>
    </div>

    <div class="row">
      <div class="col form-group">
        <label>Birth Month</label>
        <select id="birthMonth" required>
          <option value="">Select Month</option>
        </select>
      </div>
      <div class="col form-group">
        <label>Day</label>
        <select id="birthDay" required>
          <option value="">Select Day</option>
        </select>
      </div>
      <div class="col form-group">
        <label>Year</label>
        <select id="birthYear" required>
          <option value="">Select Year</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Male" required> Male</label>
          <label><input type="radio" name="gender" value="Female"> Female</label>
        </div>
      </div>
      <div class="col form-group">
        <label>Country of Citizenship</label>
        <input type="text" id="citizenship" required>
      </div>
    </div>

    <div class="row">
      <div class="col form-group">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="(000) 000-0000" required>
      </div>
      <div class="col form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
    </div>

    <div class="form-group">
      <label>Mailing Address</label>
      <input type="text" id="address1" placeholder="Street Address" required>
      <input type="text" id="address2" placeholder="Street Address Line 2">
      <div class="row">
        <div class="col"><input type="text" id="city" placeholder="City" required></div>
        <div class="col"><input type="text" id="state" placeholder="State / Province" required></div>
      </div>
      <input type="text" id="postal" placeholder="Postal / Zip Code" required>
    </div>

    <div class="form-group">
      <label>Emergency Contact</label>
      <div class="row">
        <div class="col"><input type="text" id="emergencyFirst" placeholder="First Name" required></div>
        <div class="col"><input type="text" id="emergencyLast" placeholder="Last Name" required></div>
        <div class="col"><input type="text" id="relationship" placeholder="Relationship" required></div>
      </div>
      <div class="row">
        <div class="col"><input type="email" id="emergencyEmail" placeholder="Email" required></div>
        <div class="col"><input type="tel" id="emergencyPhone" placeholder="(000) 000-0000" required></div>
      </div>
    </div>

    <div class="form-group">
      <label>Do you speak any languages other than English?</label>
      <div class="radio-group">
        <label><input type="radio" name="otherLang" value="Yes" required> Yes</label>
        <label><input type="radio" name="otherLang" value="No"> No</label>
      </div>
    </div>

    <button type="submit">Submit</button>
  </form>

  <div class="output" id="result" style="display: none;"></div>
</div>

<script>
  // Populate month, day, year dynamically
  const months = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];

  const birthMonth = document.getElementById("birthMonth");
  months.forEach(month => {
    const option = document.createElement("option");
    option.textContent = month;
    option.value = month;
    birthMonth.appendChild(option);
  });

  const birthDay = document.getElementById("birthDay");
  for (let i = 1; i <= 31; i++) {
    const option = document.createElement("option");
    option.textContent = i;
    option.value = i;
    birthDay.appendChild(option);
  }

  const birthYear = document.getElementById("birthYear");
  const currentYear = new Date().getFullYear();
  for (let i = currentYear; i >= 1980; i--) {
    const option = document.createElement("option");
    option.textContent = i;
    option.value = i;
    birthYear.appendChild(option);
  }

  // Form submission handler
  document.getElementById("admissionForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const fullName = `${document.getElementById("firstName").value} ${document.getElementById("middleName").value} ${document.getElementById("lastName").value}`;
    const birthMonth = document.getElementById("birthMonth").value;
    const birthDay = document.getElementById("birthDay").value;
    const birthYear = document.getElementById("birthYear").value;
    const gender = document.querySelector('input[name="gender"]:checked').value;
    const citizenship = document.getElementById("citizenship").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const address1 = document.getElementById("address1").value;
    const address2 = document.getElementById("address2").value;
    const city = document.getElementById("city").value;
    const state = document.getElementById("state").value;
    const postal = document.getElementById("postal").value;

    const emergencyName = `${document.getElementById("emergencyFirst").value} ${document.getElementById("emergencyLast").value}`;
    const emergencyRelationship = document.getElementById("relationship").value;
    const emergencyEmail = document.getElementById("emergencyEmail").value;
    const emergencyPhone = document.getElementById("emergencyPhone").value;

    const speaksOtherLang = document.querySelector('input[name="otherLang"]:checked').value;

    const result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML = `
      <h3>Submission Summary:</h3>
      <p><strong>Full Name:</strong> ${fullName}</p>
      <p><strong>Birth Date:</strong> ${birthMonth} ${birthDay}, ${birthYear}</p>
      <p><strong>Gender:</strong> ${gender}</p>
      <p><strong>Citizenship:</strong> ${citizenship}</p>
      <p><strong>Phone:</strong> ${phone}</p>
      <p><strong>Email:</strong> ${email}</p>
      <p><strong>Address:</strong> ${address1}, ${address2 ? address2 + ', ' : ''}${city}, ${state}, ${postal}</p>
      <p><strong>Emergency Contact:</strong> ${emergencyName} (${emergencyRelationship}) - ${emergencyPhone}, ${emergencyEmail}</p>
      <p><strong>Speaks Other Languages:</strong> ${speaksOtherLang}</p>
    `;
  });
</script>

</body>
</html>
