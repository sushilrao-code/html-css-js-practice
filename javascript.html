<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Marks</title>
  <style>
    .marks, .detail {
      height: 50%;
      width: 80%;
      background-color: beige;
      padding: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1 id="text"></h1>
  <button id="click" onclick="showtext()" style="padding: 25px;">Click me!</button>

  <script>
    function showtext() {
      document.getElementById("text").innerHTML = "Hi, this is JS program.";
    }
  </script>

  <div class="marks">
    <form id="stdmarks">
      <label for="Student1">Subject-1 Marks:</label>
      <input type="number" id="Student1" name="Student1" required min="20" max="100"><br><br>

      <label for="Student2">Subject-2 Marks:</label>
      <input type="number" id="Student2" name="Student2" required min="20" max="100"><br><br>

      <label for="Student3">Subject-3 Marks:</label>
      <input type="number" id="Student3" name="Student3" required min="20" max="100"><br><br>

      <label for="Student4">Subject-4 Marks:</label>
      <input type="number" id="Student4" name="Student4" required min="20" max="100"><br><br>

      <label for="Student5">Subject-5 Marks:</label>
      <input type="number" id="Student5" name="Student5" required min="20" max="100"><br><br>

      <button type="submit" style="border-radius:10px; border:none; background-color:bisque; padding:10px;">Submit</button>
    </form>
  </div>

  <div class="detail">
    <h1 style="text-align: center;">Student Marks Detail</h1>
    <p id="s1"></p>
    <p id="s2"></p>
    <p id="s3"></p>
    <p id="s4"></p>
    <p id="s5"></p>
    <p id="percent"></p>
  </div>

  <script>
    document.getElementById("stdmarks").addEventListener("submit", function(e) {
      e.preventDefault();
      const data = {
        sub1: parseInt(document.getElementById("Student1").value),
        sub2: parseInt(document.getElementById("Student2").value),
        sub3: parseInt(document.getElementById("Student3").value),
        sub4: parseInt(document.getElementById("Student4").value),
        sub5: parseInt(document.getElementById("Student5").value)
      };

      document.getElementById("s1").innerHTML = `Student-1 Marks: ${data.sub1}`;
      document.getElementById("s2").innerHTML = `Student-2 Marks: ${data.sub2}`;
      document.getElementById("s3").innerHTML = `Student-3 Marks: ${data.sub3}`;
      document.getElementById("s4").innerHTML = `Student-4 Marks: ${data.sub4}`;
      document.getElementById("s5").innerHTML = `Student-5 Marks: ${data.sub5}`;

      const percent = (((data.sub1 + data.sub2 + data.sub3 + data.sub4 + data.sub5) / 500) * 100).toFixed(2);
      document.getElementById("percent").innerHTML = `Percentage(%): ${percent}`;
    });
  </script>

</body>
</html>
