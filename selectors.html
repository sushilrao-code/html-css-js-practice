<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
      /*  Element Selector */
      /*  div{
            background-color: brown;
        }*/
        /* Class Selector */
        .red{
            background-color: red;
        }
        /* ID Selector */
        #blue{
            background-color: rgb(175, 10, 73);
        }
        /* child Selector */
        div > p{
            color: rgb(5, 28, 7);
            background-color: rgb(204, 204, 48);
        }
        /* Descendant Selector */
        div p{
            color: rgb(0, 255, 17);
            background-color: rgb(11, 12, 77);
        }
        /* using the universal selector */
        *{
            font-family: Arial, sans-serif;
            font-size: 20px;
            margin: 0px;
            padding: 0px;
        }
        /* using the attribute selector */
        [id]{
            border: 2px solid black;
        }
        /* using the pseudo-class selector */
        a:hover{
            color: rgb(196, 219, 21);
            text-decoration: none;
        }
        a:visited{
            color: rgb(195, 18, 222);
        }
        a:link{
            color: rgb(0, 0, 255);
        }
        a:active{
            background-color: rgb(20, 45, 145);
        }
        p:first-child{
            background-color: blueviolet;
        }

    </style>
</head>

<body>
    <main>
         
        <p>This is a paragraph.</p>
        <p>This is another paragraph.</p>
    </main>
   <div class="red">
    I am div
    <p>I am a paragraph inside a div</p>
    <article>
        <p>I am a paragraph inside an article</p>
    </article>
   </div>
   <div id="blue">
    I am another div
    </div>
    <div>
        <a href="https://www.google.com">Google</a>
    </div>
    <a href="https://www.facebook.com">Facebook</a>
    <a href="https://www.twitter.com">Twitter</a>
    <a href="https://www.instagram.com">Instagram</a>
    
</body>
</html>
